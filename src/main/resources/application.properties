# ===============================
# APPLICATION NAME
# ===============================
spring.application.name=starwars-books-library

# ===============================
# SERVER CONFIGURATION
# ===============================
server.port=8080

# ===============================
# DATABASE CONFIGURATION (AZURE MYSQL)
# ===============================
spring.datasource.url=jdbc:mysql://starwars-db-carlos.mysql.database.azure.com:3306/starwarslibrary?useSSL=true&requireSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=true

spring.datasource.username=adminuser
spring.datasource.password=Password123!

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# ===============================
# JPA / HIBERNATE CONFIGURATION
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true