<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <!-- Page title -->
    <title>Edit Star Wars Book</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

</head>

<body>

<div class="container my-4">

    <!-- Page heading -->
    <h2 class="text-center mb-4">Edit Star Wars Book</h2>

    <!-- Form that updates the book -->
	<div class="card shadow p-4">

	<form th:action="@{/saveBook}" th:object="${book}" method="post">

        <!-- Hidden field for the ID -->
        <input type="hidden" th:field="*{id}"/>

        <!-- Title -->
      <div class="form-group mb-3">
            <label>Title</label>
            <input type="text" th:field="*{title}" class="form-control" required>
        </div>

        <!-- Author -->
        <div class="form-group mb-3">
            <label>Author</label>
            <input type="text" th:field="*{author}" class="form-control" required>
        </div>

        <!-- Series -->
        <div class="form-group mb-3">
            <label>Series</label>
            <input type="text" th:field="*{series}" class="form-control">
        </div>

        <!-- Era -->
        <div class="form-group mb-3">
            <label>Era</label>
            <input type="text" th:field="*{era}" class="form-control">
        </div>

        <!-- Publication Year -->
        <div class="form-group mb-3">
            <label>Publication Year</label>
            <input type="number" th:field="*{publicationYear}" class="form-control">
        </div>

        <!-- Canon Status -->
        <div class="form-group mb-3">
            <label>Canon Status</label>
			<select th:field="*{canonStatus}" class="form-control">
			    <option value="">Select Status</option>
			    <option value="Canon">Canon</option>
			    <option value="Legends">Legends</option>
			</select>
        </div>

        <!-- Update button -->
		<div class="text-center mt-4">

		    <button type="submit" class="btn btn-success mr-2">
		        Update Book
		    </button>

		    <a th:href="@{/}" class="btn btn-secondary">
		        Cancel
		    </a>

		</div>
		
	</form>

    </form>

</div>

</body>
</html>
