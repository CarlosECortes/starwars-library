<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <!-- Page title -->
    <title>Star Wars Book Library</title>

    <!-- Bootstrap CSS for styling -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

</head>

<body>

<div class="container my-4">

    <!-- Page heading -->
    <h1 class="text-center mb-4">Star Wars Book Library Manager</h1>

    <!-- Button to add a new book -->
    <a th:href="@{/showNewBookForm}" class="btn btn-success mb-3">
        Add New Book
    </a>

    <!-- Table displaying all books -->
   <table class="table table-bordered table-striped table-hover shadow">

        <!-- Table headers -->
        <thead class="thead-dark">
        <tr>
            <th>Title</th>
            <th>Author</th>
            <th>Series</th>
            <th>Era</th>
            <th>Publication Year</th>
            <th>Canon Status</th>
            <th>Actions</th>
        </tr>
        </thead>

        <!-- Table body -->
        <tbody>

        <!-- Loop through each book -->
        <tr th:each="book : ${listBooks}">

            <td th:text="${book.title}"></td>
            <td th:text="${book.author}"></td>
            <td th:text="${book.series}"></td>
            <td th:text="${book.era}"></td>
            <td th:text="${book.publicationYear}"></td>
            <td th:text="${book.canonStatus}"></td>

           <td class="text-center">

                <!-- Edit button -->
				<a th:href="@{/showFormForUpdate/{id}(id=${book.id})}"
				   class="btn btn-warning btn-sm mr-2">
				    Edit
				</a>

                <!-- Delete button -->
				<a th:href="@{/deleteBook/{id}(id=${book.id})}"
				   class="btn btn-danger btn-sm">
				    Delete
				</a>

            </td>

        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
