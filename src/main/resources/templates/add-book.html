<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <!-- Page title -->
    <title>Add Star Wars Book</title>

    <!-- Bootstrap CSS for styling -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

</head>

<body>

<div class="container my-4">

    <!-- Page heading -->
	<h2 class="text-center mb-4">Add New Star Wars Book</h2>

    <!-- Form that submits data to /saveBook -->
	<div class="card shadow p-4">

	<form th:action="@{/saveBook}" th:object="${book}" method="post">

        <!-- Title input -->
        <div class="form-group mb-3">
            <label>Title</label>
            <input type="text" th:field="*{title}" class="form-control" required>
        </div>

        <!-- Author input -->
        <div class="form-group mb-3">
            <label>Author</label>
            <input type="text" th:field="*{author}" class="form-control" required>
        </div>

        <!-- Series input -->
        <div class="form-group mb-3">
            <label>Series</label>
            <input type="text" th:field="*{series}" class="form-control">
        </div>

        <!-- Era input -->
        <div class="form-group mb-3">
            <label>Era</label>
            <input type="text" th:field="*{era}" class="form-control">
        </div>

        <!-- Publication year input -->
        <div class="form-group mb-3">
            <label>Publication Year</label>
            <input type="number" th:field="*{publicationYear}" class="form-control">
        </div>

        <!-- Canon status input -->
        <div class="form-group mb-3">
            <label>Canon Status</label>
			<select th:field="*{canonStatus}" class="form-control">
			    <option value="">Select Status</option>
			    <option value="Canon">Canon</option>
			    <option value="Legends">Legends</option>
			</select>
        </div>

        <!-- Save button & Cancel button -->
		<div class="text-center mt-4">

		    <button type="submit" class="btn btn-success mr-2">
		        Save Book
		    </button>

		    <a th:href="@{/}" class="btn btn-secondary">
		        Cancel
		    </a>

		</div>

    </form>
	</div>
</div>

</body>
</html>
